<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gielinor · Switchboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jacquard+12&family=VT323&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<!-- RuneScape UF — the in-game chatbox font (CDNFonts). Falls back to a clean
     bold sans if the CDN is unreachable. -->
<link href="https://fonts.cdnfonts.com/css/runescape-uf" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=15">
</head>
<body>
<div class="stage">

  <aside class="switchboard" aria-label="Session switchboard">
    <header>
      <span class="log-title">SWITCHBOARD</span>
      <span class="sb-count" id="sbCount">—</span>
      <button id="termToggle" class="crt-toggle" type="button" title="Toggle embedded terminal — launch a claude session in-app">▶_</button>
      <button id="crtToggle" class="crt-toggle" type="button" title="Toggle CRT mode (or ?crt=1)">▦</button>
    </header>
    <div class="sb-list" id="sbList">
      <div class="sb-empty">no sessions found</div>
    </div>
    <div class="sb-legend" id="sbLegend"></div>
  </aside>

  <div class="logbox">
    <header>
      <span class="log-title">COMMS</span>
      <input class="log-search" id="logSearch" type="text" placeholder="/ filter…" spellcheck="false" autocomplete="off" aria-label="Filter chat">
    </header>
    <div class="log-scroll" id="logScroll"></div>
    <button class="jump-latest" id="jumpLatest" type="button"><span class="arrow">↓</span><span id="jumpLatestCount">latest</span></button>

    <!-- OSRS-style bottom bar: channel mute-toggles (left) + settings (right) -->
    <div class="chat-bar" id="chatBar">
      <div class="cb-group cb-channels" role="tablist">
        <button class="cb-btn cb-all" data-act="all" type="button" title="Un-mute every channel">
          <span class="cb-name">All</span>
        </button>
        <button class="cb-btn cb-chan" data-chan="players" type="button" title="Players — Jebrim · Zezima · Wisp (click to mute/show)">
          <span class="cb-name">Players</span><span class="cb-state">On</span>
        </button>
        <button class="cb-btn cb-chan" data-chan="subagents" type="button" title="Sub-agents — Dwarves · Gnomes · Penguins (click to mute/show)">
          <span class="cb-name">Sub-agents</span><span class="cb-state">On</span>
        </button>
        <button class="cb-btn cb-chan" data-chan="braindead" type="button" title="Braindead — dev-brain construction (click to mute/show)">
          <span class="cb-name">Braindead</span><span class="cb-state">On</span>
        </button>
        <button class="cb-btn cb-chan" data-chan="guthix" type="button" title="Guthix — consultation / bankstanding (click to mute/show)">
          <span class="cb-name">Guthix</span><span class="cb-state">On</span>
        </button>
        <button class="cb-btn cb-chan" data-chan="commits" type="button" title="Commit drop-banners (click to mute/show)">
          <span class="cb-name">Commits</span><span class="cb-state">On</span>
        </button>
      </div>
      <div class="cb-group cb-settings">
        <button class="cb-btn cb-toggle" data-set="actions" type="button" title="Show/hide the tool-call action stream (Read · Edit · Glob · git)">
          <span class="cb-name">Actions</span><span class="cb-state">On</span>
        </button>
        <button class="cb-btn cb-toggle" data-set="sound" type="button" title="Chime when a session flips to WAITING">
          <span class="cb-name">Sound</span><span class="cb-state">Off</span>
        </button>
        <button class="cb-btn cb-report" data-act="clear" type="button" title="Clear the visible chat (refills as new events arrive)">
          <span class="cb-name">Clear</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Embedded terminal (S058) — hidden until ▶_ toggled. Hosts a claude
       session over a PTY bridge (see server.py + terminal.js). -->
  <div class="terminalbox" id="terminalbox">
    <header>
      <span class="log-title">TERMINAL</span>
      <button id="termNew" class="crt-toggle" type="button" title="New claude session">+ new</button>
    </header>
    <div class="term-body">
      <div class="term-rail" id="termTabs"></div>
      <div class="term-stack" id="termStack"></div>
    </div>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
