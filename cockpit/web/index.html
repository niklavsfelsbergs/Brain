<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Switchboard</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Phone layout: scoped under @media(max-width:760px) + body.m-mobile, so the
       desktop window never activates it. Paired with mobile.js. -->
  <link rel="stylesheet" href="mobile.css" />
  <!-- xterm.js (vendored, offline) for the embedded real-terminal view (S066 B).
       Classic UMD scripts → window.Terminal / window.FitAddon, available before
       the deferred main.js module runs. -->
  <link rel="stylesheet" href="vendor/xterm.css" />
  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
  <!-- No build step. Preact + htm over an ESM import map (D-028).
       CDN at load for now; vendor locally in the Phase 5 polish for offline use. -->
  <script type="importmap">
  {
    "imports": {
      "preact": "https://esm.sh/preact@10.19.3",
      "preact/hooks": "https://esm.sh/preact@10.19.3/hooks",
      "htm/preact": "https://esm.sh/htm@3.1.1/preact"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="main.js"></script>
  <!-- Mobile layout controller; runs after main.js so #app is populated. -->
  <script type="module" src="mobile.js"></script>
</body>
</html>
