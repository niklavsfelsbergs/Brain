<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gielinor · Switchboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jacquard+12&family=VT323&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=6">
</head>
<body>
<div class="stage">

  <aside class="switchboard" aria-label="Session switchboard">
    <header>
      <span class="log-title">SWITCHBOARD</span>
      <span class="sb-count" id="sbCount">—</span>
      <button id="crtToggle" class="crt-toggle" type="button" title="Toggle CRT mode (or ?crt=1)">▦</button>
    </header>
    <div class="sb-list" id="sbList">
      <div class="sb-empty">no sessions found</div>
    </div>
    <div class="sb-legend" id="sbLegend"></div>
  </aside>

  <div class="logbox">
    <header>
      <span class="log-title">COMMS</span>
      <input class="log-search" id="logSearch" type="text" placeholder="/ filter…" spellcheck="false" autocomplete="off" aria-label="Filter chat">
      <div class="log-tabs" id="logTabs" role="tablist">
        <span class="log-tab active" data-tab="all"      role="tab"><span class="dot"></span>ALL</span>
        <span class="log-tab"        data-tab="jebrim"   role="tab"><span class="dot"></span>JEBRIM</span>
        <span class="log-tab"        data-tab="zezima"   role="tab"><span class="dot"></span>ZEZIMA</span>
        <span class="log-tab"        data-tab="dwarves"  role="tab"><span class="dot"></span>DWARVES</span>
        <span class="log-tab"        data-tab="gnomes"   role="tab"><span class="dot"></span>GNOMES</span>
        <span class="log-tab"        data-tab="penguins" role="tab"><span class="dot"></span>PENGUINS</span>
        <span class="log-tab"        data-tab="wisp"     role="tab"><span class="dot"></span>WISP</span>
        <span class="log-tab"        data-tab="braindead" role="tab"><span class="dot"></span>BRAINDEAD</span>
        <span class="log-tab"        data-tab="guthix"   role="tab"><span class="dot"></span>GUTHIX</span>
        <span class="log-tab"        data-tab="commits"  role="tab"><span class="dot"></span>COMMITS</span>
      </div>
    </header>
    <div class="log-scroll" id="logScroll"></div>
    <button class="jump-latest" id="jumpLatest" type="button"><span class="arrow">↓</span><span id="jumpLatestCount">latest</span></button>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
