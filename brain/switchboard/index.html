<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gielinor · Switchboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jacquard+12&family=VT323&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #efe2bb;
    --parchment-dk: #d8c694;
    --ink: #28201a;
    --ink-soft: #50402f;
    --frame-bg: #14100c;
    --frame-edge: #2c2018;
    --gold: #d8ad36;
    --gold-dk: #997620;
    /* C1 (S022): per-actor chat tints. `-text` reads on the light tan COMMS
       panel; `-dot` reads on the dark frame. Used by chat user-prefix,
       speaker-bullet, tab-dot, and legend so changing the canonical color in
       one place propagates everywhere. */
    --jebrim-text: #1f4b8a;      --jebrim-dot: #9bc4ff;
    --zezima-text: #a44a14;      --zezima-dot: #ffb56b;
    --dwarves-text: #8a5a10;     --dwarves-dot: #ffd24a;     --dwarves-swatch: #cf9a2c;
    --gnomes-text: #5b3d6e;      --gnomes-dot: #c8a8e0;      --gnomes-swatch: #8b6caf;
    --penguins-text: #1e3a5c;    --penguins-dot: #9bb6d8;    --penguins-swatch: #4b6f9c;
    --wisp-text: #8a7020;        --wisp-dot: #fff4c8;
    --braindead-text: #1a6660;   --braindead-dot: #7fa6a0;
    --guthix-text: #1f7045;      --guthix-dot: #8af0c6;     --guthix-swatch: #2f6a44;
    --commits-text: #6e2c14;     --commits-dot: #ff9344;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background:
      radial-gradient(ellipse at top, #2a1f15 0%, #14100c 60%, #0a0805 100%);
    color: var(--parchment);
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 18px;
    min-height: 100vh;
    overflow: hidden;
  }

  .stage {
    max-width: none;
    margin: 0;
    padding: 14px;
    display: flex;
    gap: 14px;
    align-items: stretch;
    height: 100vh;
    box-sizing: border-box;
  }

  /* ─── Switchboard pane (D-020, Phase 2) ───
     Polls state-switchboard.json (written by status-sidecar.py on every
     turn-bracketing hook event) and renders one row per live Claude Code
     session. The point: see at a glance which terminal is waiting for the
     principal, which is mid-work, which is idle — without alt-tabbing
     through every window. Width 280px. */
  .switchboard {
    margin-top: 0;
    background: #c8b48a;
    border: 2px solid #2c1f10;
    width: 280px;
    flex-shrink: 0;
    align-self: stretch;
    overflow: hidden;
    position: relative;
    box-shadow:
      inset 0 0 0 1px #8a7048,
      inset 1px 1px 0 #e0caa0,
      inset -1px -1px 0 #5a4020,
      0 6px 16px rgba(0,0,0,0.5);
    color: #1a0f06;
    display: flex;
    flex-direction: column;
  }
  .switchboard > header {
    background: linear-gradient(180deg, #4a3520 0%, #2e2010 100%);
    border-bottom: 2px solid #0a0604;
    box-shadow: inset 0 -1px 0 #5a4126, inset 0 1px 0 #7a5e3a;
    padding: 4px 12px;
    font-family: 'VT323', 'Jacquard 12', serif;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: #ffcb46;
    text-shadow: 1px 1px 0 #1a0f06;
    display: flex;
    align-items: center;
    gap: 10px;
    height: 30px;
  }
  .switchboard > header::before {
    content: "";
    width: 7px; height: 7px;
    background: #5fff5f;
    box-shadow: 0 0 4px #5fff5f, 1px 1px 0 #1a0f06;
    animation: pulse 1400ms ease-in-out infinite;
  }
  .switchboard .sb-count {
    margin-left: auto;
    font-size: 13px;
    color: #ffcb46;
    opacity: 0.75;
    letter-spacing: 0.04em;
  }
  .switchboard .sb-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px;
    background: linear-gradient(180deg, #d0bc94 0%, #beaa82 100%);
    font-family: 'Trebuchet MS', 'Verdana', 'Tahoma', sans-serif;
  }
  .switchboard .sb-list::-webkit-scrollbar { width: 10px; }
  .switchboard .sb-list::-webkit-scrollbar-track { background: #8a7048; border-left: 1px solid #2c1f10; }
  .switchboard .sb-list::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #4a3520 0%, #2c1f10 100%);
    border: 1px solid #1a0f06;
  }
  .sb-row {
    display: grid;
    grid-template-columns: 14px 1fr auto auto;
    grid-template-rows: auto auto auto;
    gap: 1px 8px;
    padding: 6px 6px 7px;
    margin-bottom: 4px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(44,31,16,0.35);
    border-left-width: 4px;
    cursor: pointer;
    transition: background 100ms;
  }
  .sb-row:hover { background: rgba(255,255,255,0.35); }
  .sb-row .sb-dot {
    grid-row: 1 / 2; grid-column: 1 / 2;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-top: 4px;
    box-shadow: 1px 1px 0 #1a0f06, 0 0 4px currentColor;
  }
  .sb-row .sb-who {
    grid-row: 1 / 2; grid-column: 2 / 3;
    font-weight: bold;
    font-size: 13px;
    color: #1a0f06;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sb-row .sb-who .sb-sid {
    font-family: 'VT323', monospace;
    font-weight: normal;
    font-size: 12px;
    color: #5a4020;
    margin-left: 4px;
    opacity: 0.7;
  }
  .sb-row .sb-state {
    grid-row: 1 / 2; grid-column: 3 / 4;
    font-family: 'VT323', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 0 5px 1px;
    border: 1px solid currentColor;
    border-radius: 2px;
    line-height: 1.45;
    align-self: center;
    background: rgba(255,255,255,0.28);
    text-transform: uppercase;
  }
  .sb-row .sb-age {
    grid-row: 1 / 2; grid-column: 4 / 5;
    font-family: 'VT323', monospace;
    font-size: 12px;
    color: #5a4020;
    align-self: center;
  }
  .sb-row .sb-intent {
    grid-row: 2 / 3; grid-column: 2 / 5;
    font-size: 12px;
    color: #2c1f10;
    line-height: 1.25;
    font-style: italic;
    margin-top: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }
  /* S049/D2: heartbeat row — latest tool action with age. Updates per-poll
     (~2s) from manifest and per-second age tick from render loop. Hidden
     when the session has no recorded action yet. */
  .sb-row .sb-action {
    grid-row: 3 / 4; grid-column: 2 / 5;
    font-family: 'VT323', monospace;
    font-size: 11px;
    color: #5a4020;
    line-height: 1.2;
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sb-row .sb-action.sb-action-empty { display: none; }
  /* State coloring on the dot + left border + chip + row tint */
  .sb-row[data-state="waiting_for_user"] {
    border-left-color: #d8a234;
    background: rgba(255, 220, 130, 0.45);
  }
  .sb-row[data-state="waiting_for_user"] .sb-dot {
    color: #d8a234;
    background: #ffd84d;
    animation: sbWaitingPulse 1100ms ease-in-out infinite;
  }
  .sb-row[data-state="waiting_for_user"] .sb-state {
    color: #6a4a10;
    background: rgba(255, 216, 77, 0.85);
    border-color: #a87820;
    animation: sbWaitingChip 1100ms ease-in-out infinite;
  }
  @keyframes sbWaitingPulse {
    0%,100% { transform: scale(1); box-shadow: 1px 1px 0 #1a0f06, 0 0 4px #ffd84d; }
    50%     { transform: scale(1.25); box-shadow: 1px 1px 0 #1a0f06, 0 0 10px #ffd84d; }
  }
  @keyframes sbWaitingChip {
    0%,100% { background: rgba(255, 216, 77, 0.85); }
    50%     { background: rgba(255, 240, 160, 1); }
  }
  .sb-row[data-state="working"] {
    border-left-color: #2e7a2e;
    background: rgba(140, 220, 140, 0.18);
  }
  .sb-row[data-state="working"] .sb-dot {
    color: #2e7a2e;
    background: #5fff5f;
  }
  .sb-row[data-state="working"] .sb-state {
    color: #1f5a1f;
    background: rgba(140, 220, 140, 0.40);
    border-color: #2e7a2e;
  }
  .sb-row[data-state="closing"] {
    border-left-color: #c45a18;
    background: rgba(220, 130, 50, 0.18);
  }
  .sb-row[data-state="closing"] .sb-dot {
    color: #c45a18;
    background: #f0903c;
    animation: sbClosingPulse 1800ms ease-in-out infinite;
  }
  .sb-row[data-state="closing"] .sb-state {
    color: #6a2a08;
    background: rgba(240, 144, 60, 0.40);
    border-color: #c45a18;
  }
  @keyframes sbClosingPulse {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.55; }
  }
  .sb-row[data-state="idle"] {
    border-left-color: #6a5a40;
    background: rgba(120, 95, 50, 0.14);
    opacity: 0.85;
  }
  .sb-row[data-state="idle"] .sb-dot {
    color: #6a5a40;
    background: #a89878;
    box-shadow: 1px 1px 0 #1a0f06;
  }
  .sb-row[data-state="idle"] .sb-state {
    color: #4a3a20;
    background: rgba(168, 152, 120, 0.40);
    border-color: #6a5a40;
  }
  .sb-row[data-state="ended"] {
    border-left-color: #4a3520;
    background: rgba(74, 53, 32, 0.14);
    opacity: 0.55;
  }
  .sb-row[data-state="ended"] .sb-dot {
    color: #4a3520;
    background: #6a5a40;
    box-shadow: 1px 1px 0 #1a0f06;
  }
  .sb-row[data-state="ended"] .sb-state {
    color: #2c1f10;
    background: rgba(106, 90, 64, 0.35);
    border-color: #4a3520;
  }
  .sb-row.sb-this {
    outline: 1px solid #ffcb46;
    outline-offset: -1px;
  }
  .sb-row.sb-this .sb-who::after {
    content: " (this)";
    font-weight: normal;
    font-size: 11px;
    color: #5a4020;
    font-family: 'VT323', monospace;
  }
  .sb-empty {
    padding: 14px;
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: #5a4020;
    text-align: center;
    font-style: italic;
  }

  /* ─── COMMS / chatbox (OSRS-style, D-014) ─── */
  /* Classic RuneScape chat: black-brown panel, bright yellow body, white
     usernames, cyan system lines. Sharp 1px inner border, no soft glow. */
  .logbox {
    margin-top: 0;
    background: #c8b48a;
    border: 2px solid #2c1f10;
    flex: 1;
    min-width: 0;
    align-self: stretch;
    overflow: hidden;
    position: relative;
    box-shadow:
      inset 0 0 0 1px #8a7048,
      inset 1px 1px 0 #e0caa0,
      inset -1px -1px 0 #5a4020,
      0 6px 16px rgba(0,0,0,0.5);
    color: #1a0f06;
    display: flex;
    flex-direction: column;
  }
  .logbox header {
    background: linear-gradient(180deg, #4a3520 0%, #2e2010 100%);
    border-bottom: 2px solid #0a0604;
    box-shadow: inset 0 -1px 0 #5a4126, inset 0 1px 0 #7a5e3a;
    padding: 4px 12px;
    font-family: 'VT323', 'Jacquard 12', serif;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: #ffcb46;
    text-shadow: 1px 1px 0 #1a0f06;
    display: flex;
    align-items: center;
    gap: 10px;
    height: 30px;
  }
  .logbox header::before {
    content: "";
    width: 7px; height: 7px;
    background: #5fff5f;
    box-shadow: 0 0 4px #5fff5f, 1px 1px 0 #1a0f06;
    animation: pulse 1400ms ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
  .log-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 6px 12px;
    font-family: 'Trebuchet MS', 'Verdana', 'Tahoma', sans-serif;
    font-weight: bold;
    font-size: 14px;
    line-height: 1.35;
    color: #1a0f06;
    background: linear-gradient(180deg, #d0bc94 0%, #beaa82 100%);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .log-scroll::-webkit-scrollbar { width: 10px; }
  .log-scroll::-webkit-scrollbar-track { background: #8a7048; border-left: 1px solid #2c1f10; }
  .log-scroll::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #4a3520 0%, #2c1f10 100%);
    border: 1px solid #1a0f06;
  }
  /* I2: jump-to-latest pip, surfaces when user scrolls up. Position covers the
     scrollbar's lower edge so it's reachable without leaving the panel. */
  .jump-latest {
    position: absolute;
    right: 14px;
    bottom: 10px;
    display: none;
    align-items: center;
    gap: 6px;
    padding: 3px 9px 4px;
    font-family: 'VT323', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: #ffcb46;
    background: #3a2812;
    border: 1px solid #0a0604;
    box-shadow: inset 1px 1px 0 #5a4126, inset -1px -1px 0 #1a0f06, 0 2px 4px rgba(0,0,0,0.4);
    cursor: pointer;
    user-select: none;
    text-transform: uppercase;
    line-height: 1;
    transition: color 100ms, background 100ms;
  }
  .jump-latest:hover { color: #ffff7a; background: #4a3520; }
  .jump-latest.visible { display: inline-flex; }
  .jump-latest .arrow { font-weight: bold; }
  .log-entry {
    padding: 0 0 1px;
    color: #0a0604;
  }
  .log-entry .t {
    color: #6a5230;
    margin-right: 6px;
    font-weight: normal;
  }
  /* Username prefix — actor-tinted, darker for legibility against tan bg */
  .log-entry .user {
    margin-right: 2px;
  }
  .log-entry .user::after { content: ":"; }
  /* Per-actor username tint — derived from --<actor>-text CSS vars (C1). */
  .log-entry[data-speaker="jebrim"]    .user { color: var(--jebrim-text); }
  .log-entry[data-speaker="zezima"]    .user { color: var(--zezima-text); }
  .log-entry[data-speaker="dwarves"]   .user { color: var(--dwarves-text); }
  .log-entry[data-speaker="wisp"]      .user { color: var(--wisp-text); }
  .log-entry[data-speaker="braindead"] .user { color: var(--braindead-text); }
  .log-entry[data-speaker="guthix"]    .user { color: var(--guthix-text); }
  .log-entry[data-speaker="gnomes"]    .user { color: var(--gnomes-text); }
  /* Body text stays black for all chat lines */
  .log-entry.intent,
  .log-entry.action { color: #0a0604; }
  /* Narration / system: muted dark italic */
  .log-entry.narrate,
  .log-entry.system,
  .log-entry.read    { color: #4a3520; font-style: italic; }
  .log-entry.commit  { color: var(--commits-text); border-top: 1px dashed color-mix(in srgb, var(--commits-text) 35%, transparent); margin-top: 3px; padding-top: 3px; }
  .log-entry.session-start { color: #1e5a1e; font-weight: bold; margin-top: 4px; }
  /* S043 (D-024): comms-channel entries from gielinor/comms/ + developer-braindead/comms/.
     OPEN/CLOSING headers carry a faint left rule so multi-line entries read as a single
     post; body lines are indented and slightly muted. */
  .log-entry.comms-open    { border-left: 2px solid color-mix(in srgb, currentColor 50%, transparent); padding-left: 6px; margin-top: 4px; }
  .log-entry.comms-update  { border-left: 2px dashed color-mix(in srgb, currentColor 40%, transparent); padding-left: 6px; margin-top: 4px; }
  .log-entry.comms-closing { border-left: 2px dotted color-mix(in srgb, currentColor 40%, transparent); padding-left: 6px; margin-top: 4px; opacity: 0.85; }
  .log-entry.comms-dialog  { border-left: 2px solid color-mix(in srgb, var(--gold) 60%, transparent); padding-left: 6px; margin-top: 4px; }
  /* Body collapsed by default — header click expands. Discipline aims at 2-3
     lines per body; collapsed default keeps the panel readable even for the
     legacy multi-paragraph entries that predate the cap. */
  .log-entry.comms-body    { display: none; color: #3b2814; padding-left: 18px; font-size: 11.5px; }
  .log-entry.comms-body.show { display: block; }
  .log-entry.comms-body .t { opacity: 0; }  /* hide timestamp on continuation lines */
  .log-entry.comms-toggleable { cursor: pointer; }
  .log-entry.comms-toggleable::after { content: " ▸"; opacity: 0.45; font-size: 10px; margin-left: 4px; }
  .log-entry.comms-toggleable.expanded::after { content: " ▾"; opacity: 0.7; }

  /* ─── COMMS tabs (OSRS-style buttons) ─── */
  .logbox header .log-title {
    color: #ffcb46;
    font-family: 'VT323', 'Jacquard 12', serif;
    text-shadow: 1px 1px 0 #1a0f06;
  }
  .log-tabs {
    display: flex;
    align-items: center;
    gap: 1px;
    margin-left: auto;
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 0.08em;
  }
  .log-tab {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px 4px;
    color: #c8a878;
    background: #3a2812;
    border: 1px solid #0a0604;
    box-shadow: inset 1px 1px 0 #5a4126, inset -1px -1px 0 #1a0f06;
    cursor: pointer;
    user-select: none;
    text-transform: uppercase;
    line-height: 1;
    transition: color 100ms, background 100ms;
  }
  .log-tab:hover { color: #ffcb46; background: #4a3520; }
  .log-tab.active {
    color: #ffff7a;
    background: #5a3f1f;
    box-shadow: inset 1px 1px 0 #1a0f06, inset -1px -1px 0 #5a4126;
  }
  .log-tab .dot {
    width: 7px; height: 7px; border-radius: 50%;
    box-shadow: 0 0 4px currentColor, 1px 1px 0 #1a0f06;
  }
  /* Tab dots — C1: background = light dot tint, glow color = dark text tint. */
  .log-tab[data-tab="all"]       .dot { background: #ffffff; color: #c8c8c8; }
  .log-tab[data-tab="jebrim"]    .dot { background: var(--jebrim-dot);    color: var(--jebrim-text); }
  .log-tab[data-tab="zezima"]    .dot { background: var(--zezima-dot);    color: var(--zezima-text); }
  .log-tab[data-tab="dwarves"]   .dot { background: var(--dwarves-dot);   color: var(--dwarves-text); }
  .log-tab[data-tab="gnomes"]    .dot { background: var(--gnomes-dot);    color: var(--gnomes-text); }
  .log-tab[data-tab="penguins"]  .dot { background: var(--penguins-dot);  color: var(--penguins-text); }
  .log-tab[data-tab="wisp"]      .dot { background: var(--wisp-dot);      color: var(--wisp-text); }
  .log-tab[data-tab="braindead"] .dot { background: var(--braindead-dot); color: var(--braindead-text); }
  .log-tab[data-tab="guthix"]    .dot { background: var(--guthix-dot);    color: var(--guthix-text); }
  .log-tab[data-tab="commits"]   .dot { background: var(--commits-dot);   color: var(--commits-text); }
  .log-tab.active .dot { box-shadow: 0 0 5px currentColor, inset 1px 1px 0 rgba(0,0,0,0.4); }
  /* I4: unread badge on inactive filter tabs. */
  .log-tab .tab-count {
    display: none;
    min-width: 14px;
    padding: 0 4px;
    margin-left: 2px;
    font-size: 11px;
    line-height: 13px;
    font-weight: bold;
    text-align: center;
    color: #1a0f06;
    background: #ffcb46;
    border: 1px solid #1a0f06;
    border-radius: 7px;
  }
  .log-tab .tab-count.has-unread { display: inline-block; }

  /* filter — hide non-matching entries when a filter is active */
  .log-scroll[data-filter="jebrim"]    .log-entry:not([data-speaker="jebrim"])    { display: none; }
  .log-scroll[data-filter="zezima"]    .log-entry:not([data-speaker="zezima"])    { display: none; }
  .log-scroll[data-filter="dwarves"]   .log-entry:not([data-speaker="dwarves"])   { display: none; }
  .log-scroll[data-filter="wisp"]      .log-entry:not([data-speaker="wisp"])      { display: none; }
  .log-scroll[data-filter="braindead"] .log-entry:not([data-speaker="braindead"]) { display: none; }
  .log-scroll[data-filter="guthix"]    .log-entry:not([data-speaker="guthix"])    { display: none; }
  .log-scroll[data-filter="commits"]   .log-entry:not([data-speaker="commits"])   { display: none; }
  .log-scroll[data-filter="gnomes"]    .log-entry:not([data-speaker="gnomes"])    { display: none; }
  .log-scroll[data-filter="penguins"]  .log-entry:not([data-speaker="penguins"])  { display: none; }

  /* Speaker bullets — derived from --<actor>-text vars (C1). */
  .log-entry[data-speaker="jebrim"]    .t::before { content: "● "; color: var(--jebrim-text); }
  .log-entry[data-speaker="zezima"]    .t::before { content: "● "; color: var(--zezima-text); }
  .log-entry[data-speaker="dwarves"]   .t::before { content: "● "; color: var(--dwarves-text); }
  .log-entry[data-speaker="wisp"]      .t::before { content: "● "; color: var(--wisp-text); }
  .log-entry[data-speaker="braindead"] .t::before { content: "● "; color: var(--braindead-text); }
  .log-entry[data-speaker="gnomes"]    .t::before { content: "● "; color: var(--gnomes-text); }
  .log-entry[data-speaker="penguins"]  .t::before { content: "● "; color: var(--penguins-text); }
  .log-entry[data-speaker="guthix"]    .t::before { content: "● "; color: var(--guthix-text); }
  .log-entry[data-speaker="commits"]   .t::before { content: "● "; color: var(--commits-text); }
</style>
</head>
<body>
<div class="stage">

  <aside class="switchboard" aria-label="Session switchboard">
    <header>
      <span class="log-title">SWITCHBOARD</span>
      <span class="sb-count" id="sbCount">—</span>
    </header>
    <div class="sb-list" id="sbList">
      <div class="sb-empty">no sessions found</div>
    </div>
  </aside>

  <div class="logbox">
    <header>
      <span class="log-title">COMMS</span>
      <div class="log-tabs" id="logTabs" role="tablist">
        <span class="log-tab active" data-tab="all"     role="tab"><span class="dot"></span>ALL</span>
        <span class="log-tab"        data-tab="jebrim"  role="tab"><span class="dot"></span>JEBRIM</span>
        <span class="log-tab"        data-tab="zezima"  role="tab"><span class="dot"></span>ZEZIMA</span>
        <span class="log-tab"        data-tab="dwarves" role="tab"><span class="dot"></span>DWARVES</span>
        <span class="log-tab"        data-tab="gnomes"  role="tab"><span class="dot"></span>GNOMES</span>
        <span class="log-tab"        data-tab="penguins" role="tab"><span class="dot"></span>PENGUINS</span>
        <span class="log-tab"        data-tab="wisp"      role="tab"><span class="dot"></span>WISP</span>
        <span class="log-tab"        data-tab="braindead" role="tab"><span class="dot"></span>BRAINDEAD</span>
        <span class="log-tab"        data-tab="guthix"    role="tab"><span class="dot"></span>GUTHIX</span>
        <span class="log-tab"        data-tab="commits"   role="tab"><span class="dot"></span>COMMITS</span>
      </div>
    </header>
    <div class="log-scroll" id="logScroll"></div>
    <button class="jump-latest" id="jumpLatest" type="button"><span class="arrow">↓</span><span id="jumpLatestCount">latest</span></button>
  </div>

</div>

<script>
"use strict";

const LIVE = new URLSearchParams(location.search).has('live');

// ─────────────────────────────────────────────────────────────
//   COMMS panel infrastructure (chat log + tab filter + jump-to-latest)
// ─────────────────────────────────────────────────────────────
const logEl = document.getElementById('logScroll');
const jumpLatestBtn = document.getElementById('jumpLatest');
const jumpLatestCountEl = document.getElementById('jumpLatestCount');

// I2: COMMS scroll-lock. When the user scrolls up to read history, suppress
// the auto-pin-to-bottom behaviour so incoming lines don't yank them back.
// Surface a "↓ N new" button that snaps to latest and clears the lock.
let logScrollLocked = false;
let logUnreadCount = 0;
const LOG_BOTTOM_THRESHOLD = 12;
function isLogAtBottom() {
  return logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - LOG_BOTTOM_THRESHOLD;
}
function updateJumpLatestButton() {
  if (!jumpLatestBtn) return;
  if (logScrollLocked && logUnreadCount > 0) {
    jumpLatestCountEl.textContent = `${logUnreadCount} new`;
    jumpLatestBtn.classList.add('visible');
  } else if (logScrollLocked) {
    jumpLatestCountEl.textContent = 'latest';
    jumpLatestBtn.classList.add('visible');
  } else {
    jumpLatestBtn.classList.remove('visible');
  }
}
function scrollLogToLatest() {
  logScrollLocked = false;
  logUnreadCount = 0;
  logEl.scrollTop = logEl.scrollHeight;
  updateJumpLatestButton();
}
function appendLogEntry(li) {
  logEl.appendChild(li);
  while (logEl.childNodes.length > 400) logEl.removeChild(logEl.firstChild);
  bumpTabUnread(li.getAttribute('data-speaker'));
  if (logScrollLocked) {
    logUnreadCount++;
    updateJumpLatestButton();
  } else {
    logEl.scrollTop = logEl.scrollHeight;
  }
}
logEl.addEventListener('scroll', () => {
  const wasLocked = logScrollLocked;
  logScrollLocked = !isLogAtBottom();
  if (wasLocked && !logScrollLocked) logUnreadCount = 0;
  updateJumpLatestButton();
});
if (jumpLatestBtn) jumpLatestBtn.addEventListener('click', scrollLogToLatest);

// I4: per-tab unread counters. When the COMMS panel is filtered to one speaker,
// matching lines from other speakers are display:none — count them against
// their tab so the operator sees activity without switching to look.
const TAB_SPEAKERS = ['jebrim','zezima','dwarves','gnomes','wisp','braindead','commits'];
const tabUnread = Object.fromEntries(TAB_SPEAKERS.map(s => [s, 0]));
const tabBadges = {};
document.querySelectorAll('.log-tab').forEach(tab => {
  const speaker = tab.dataset.tab;
  if (TAB_SPEAKERS.includes(speaker)) {
    const badge = document.createElement('span');
    badge.className = 'tab-count';
    tab.appendChild(badge);
    tabBadges[speaker] = badge;
  }
});
function renderTabBadge(speaker) {
  const badge = tabBadges[speaker];
  if (!badge) return;
  const n = tabUnread[speaker];
  badge.textContent = n > 0 ? (n > 99 ? '99+' : String(n)) : '';
  badge.classList.toggle('has-unread', n > 0);
}
function bumpTabUnread(speaker) {
  if (!(speaker in tabUnread)) return;
  const active = logEl.getAttribute('data-filter');
  if (!active || active === speaker) return;
  tabUnread[speaker]++;
  renderTabBadge(speaker);
}
function clearTabUnread(speaker) {
  if (speaker === 'all') {
    for (const k of TAB_SPEAKERS) { tabUnread[k] = 0; renderTabBadge(k); }
  } else if (speaker in tabUnread) {
    tabUnread[speaker] = 0;
    renderTabBadge(speaker);
  }
}

// Speaker tab filter — clicking a tab filters log-scroll to that speaker only.
document.querySelectorAll('.log-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.log-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const v = tab.dataset.tab;
    if (v === 'all') logEl.removeAttribute('data-filter');
    else logEl.setAttribute('data-filter', v);
    clearTabUnread(v);
  });
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
// Live-mode wall clock from ISO timestamp on event → HH:MM:SS in local time.
function formatWall(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return '--:--:--';
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

// D-014: chat-style line with username prefix in actor-colored span.
// Renders as "[time] <user>:</user> <body>" — username picks up per-speaker color.
function logChatLine(actor, body, cls='', speaker='system') {
  const li = document.createElement('div');
  li.className = 'log-entry ' + cls;
  li.setAttribute('data-speaker', speaker);
  const tStr = formatWall(new Date().toISOString());
  li.innerHTML = `<span class="t">[${tStr}]</span><span class="user">${escapeHtml(actor)}</span> ${escapeHtml(body)}`;
  appendLogEntry(li);
  return li;
}

// ─────────────────────────────────────────────────────────────
//   SWITCHBOARD (D-020 Phase 2)
//   Polls state-switchboard.json (written by status-sidecar.py)
//   and renders one row per live Claude Code session.
// ─────────────────────────────────────────────────────────────
const SB_IDLE_AFTER_SEC = 5 * 60;
const SB_CLOSING_RX = /wrap(ping)?\s*up|clos(e|ing)\s*session|session\s*close/i;
function sbAgeSec(record) {
  if (!record || !record.last_event_ts) return 0;
  return Math.max(0, (Date.now() / 1000) - record.last_event_ts);
}
function deriveSessionState(record) {
  if (record.state === 'ended') return 'ended';
  if (record.state === 'waiting_for_user' && sbAgeSec(record) > SB_IDLE_AFTER_SEC) return 'idle';
  if (record.state === 'working' && SB_CLOSING_RX.test(record.intent || '')) return 'closing';
  return record.state || 'unknown';
}

(function initSwitchboard() {
  const listEl = document.getElementById('sbList');
  const countEl = document.getElementById('sbCount');
  if (!listEl || !countEl) return;

  const POLL_MS = 2000;
  // The session running THIS visualizer instance — try the URL ?sid8=... first
  // (lets the operator label one window as "this").
  const thisSid8 = new URLSearchParams(location.search).get('sid8') || '';

  const ageSec = sbAgeSec;
  const deriveState = deriveSessionState;
  function formatAge(sec) {
    sec = Math.floor(sec);
    if (sec < 60) return sec + 's';
    if (sec < 3600) return Math.floor(sec / 60) + 'm';
    return Math.floor(sec / 3600) + 'h';
  }
  // Sort order: waiting_for_user first (most urgent), then working, then idle,
  // then ended. Within a state, newest activity first.
  const STATE_RANK = { waiting_for_user: 0, working: 1, closing: 2, idle: 3, ended: 4, unknown: 5 };
  const STATE_LABEL = { waiting_for_user: 'WAITING', working: 'WORKING', closing: 'CLOSING', idle: 'IDLE', ended: 'ENDED', unknown: '?' };
  function sortSessions(sessions) {
    return sessions.slice().sort((a, b) => {
      const sa = deriveState(a), sb = deriveState(b);
      const ra = STATE_RANK[sa] ?? 9, rb = STATE_RANK[sb] ?? 9;
      if (ra !== rb) return ra - rb;
      return (b.last_event_ts || 0) - (a.last_event_ts || 0);
    });
  }
  function actorLabel(record) {
    const name = (record.actor || 'unknown');
    if (!name || name === 'unknown') return 'Pending...';
    const cap = name.charAt(0).toUpperCase() + name.slice(1);
    const inst = (record.instance && record.instance > 1) ? '·' + record.instance : '';
    return cap + inst;
  }
  function render(sessions) {
    listEl.innerHTML = '';
    const ordered = sortSessions(sessions);
    if (!ordered.length) {
      const empty = document.createElement('div');
      empty.className = 'sb-empty';
      empty.textContent = 'no sessions found';
      listEl.appendChild(empty);
      countEl.textContent = '0';
      return;
    }
    // Counts: only "live" sessions in the count badge (not ended).
    let live = 0, waiting = 0;
    for (const r of ordered) {
      const s = deriveState(r);
      if (s !== 'ended') live++;
      if (s === 'waiting_for_user') waiting++;
    }
    countEl.textContent = waiting > 0
      ? `${live} live · ${waiting} waiting`
      : `${live} live`;

    for (const r of ordered) {
      const state = deriveState(r);
      const row = document.createElement('div');
      row.className = 'sb-row';
      row.dataset.state = state;
      row.dataset.sid8 = r.sid8 || '';
      if (thisSid8 && r.sid8 === thisSid8) row.classList.add('sb-this');

      const dot = document.createElement('div');
      dot.className = 'sb-dot';
      row.appendChild(dot);

      const who = document.createElement('div');
      who.className = 'sb-who';
      who.textContent = actorLabel(r);
      const sid = document.createElement('span');
      sid.className = 'sb-sid';
      sid.textContent = r.sid8 || '';
      who.appendChild(sid);
      row.appendChild(who);

      const stateChip = document.createElement('div');
      stateChip.className = 'sb-state';
      stateChip.textContent = STATE_LABEL[state] || state;
      row.appendChild(stateChip);

      const age = document.createElement('div');
      age.className = 'sb-age';
      age.textContent = formatAge(ageSec(r));
      row.appendChild(age);

      const intent = document.createElement('div');
      intent.className = 'sb-intent';
      // Strip BOM if the intent file was written with one (Windows quirk).
      intent.textContent = (r.intent || '').replace(/^﻿/, '') || '—';
      row.appendChild(intent);

      // S049/D2: heartbeat row — latest tool action with age. Hidden when
      // session has no recorded action (fresh session, replay-only viz, etc.).
      const action = document.createElement('div');
      action.className = 'sb-action';
      if (r.latest_action && r.latest_action_ts) {
        const sec = Math.max(0, (Date.now() / 1000) - r.latest_action_ts);
        action.textContent = `${r.latest_action} · ${formatAge(sec)}`;
      } else {
        action.classList.add('sb-action-empty');
      }
      row.appendChild(action);

      // Click → fire vscode://niksis8.claude-focus URI handled by the
      // claude-focus extension. Shift-click copies sid8 to clipboard.
      row.addEventListener('click', (ev) => {
        if (!r.sid8) return;
        if (ev.shiftKey) {
          if (navigator.clipboard) {
            navigator.clipboard.writeText(r.sid8).then(() => {
              row.style.outline = '2px solid #ffcb46';
              setTimeout(() => { row.style.outline = ''; }, 350);
            }).catch(() => {});
          }
          return;
        }
        row.style.outline = '2px solid #2e7a2e';
        setTimeout(() => { row.style.outline = ''; }, 350);
        window.location.href = 'vscode://niksis8.claude-focus/focus?sid8=' + encodeURIComponent(r.sid8);
      });
      row.title = `${r.session_id || r.sid8}\nproject: ${r.project_dir || '?'}\nstate: ${state}\nclick → focus terminal pane\nshift-click → copy sid8`;

      listEl.appendChild(row);
    }
  }

  // Cached manifest so the age column can re-render on a 1s tick without a
  // fresh fetch. Otherwise the displayed age only changes every poll cycle.
  let cached = [];
  let polling = false;
  async function pollSwitchboard() {
    if (polling) return;
    polling = true;
    try {
      const res = await fetch('state-switchboard.json?_=' + Date.now(), {cache: 'no-store'});
      if (!res.ok) return;
      const j = await res.json();
      cached = (j && Array.isArray(j.sessions)) ? j.sessions : [];
      render(cached);
    } catch (_) {
      // file may not exist yet (sidecar hasn't fired) — silent, retry next tick
    } finally {
      polling = false;
    }
  }
  pollSwitchboard();
  setInterval(pollSwitchboard, POLL_MS);
  // Re-render every second so ages tick without re-fetching.
  setInterval(() => { if (cached.length) render(cached); }, 1000);
})();

// ─────────────────────────────────────────────────────────────
//   S043 (D-024): COMMS feed — render inter-session dialogue
// ─────────────────────────────────────────────────────────────
// In live mode only. Polls the two comms files mirrored into VIZ_DIR by the
// status-sidecar hook. The chat panel carries "what we're saying to each
// other" — the comms-channel posts (OPEN / UPDATE / CLOSING / → @sibling).
(function initCommsFeed() {
  if (!LIVE) return;

  const SOURCES = [
    {url: 'state-comms-gielinor.md',  origin: 'gielinor'},
    {url: 'state-comms-braindead.md', origin: 'braindead'},
  ];
  const POLL_MS = 3000;
  // Track last-rendered entry header (timestamp + actor + KIND) per origin
  // so we don't re-render after a poll. First load uses the tail of each file
  // as the seen set, so reload doesn't dump history — only NEW entries render.
  const seen = {gielinor: new Set(), braindead: new Set()};
  let primed = {gielinor: false, braindead: false};

  // Header pattern: `[timestamp] actor-sid8 KIND`
  // KIND can be: OPEN | UPDATE | CLOSING | ABANDONED | SCAFFOLD | → @target...
  const HEADER_RE = /^\[([^\]]+)\]\s+(\S+)\s+(.+)$/;

  function parseHeader(line) {
    const m = HEADER_RE.exec(line);
    if (!m) return null;
    return {ts: m[1], who: m[2], kind: m[3].trim()};
  }

  // Pull all entries from a parsed file. An entry is a header line followed
  // by zero or more 2-space-indented body lines, separated from neighbours by
  // a blank line. Anything that isn't a recognized header is dropped silently
  // (file headers, > quotes, --- rules, etc).
  function parseEntries(text) {
    const lines = text.split(/\r?\n/);
    const out = [];
    let cur = null;
    for (const raw of lines) {
      const line = raw.replace(/\s+$/, '');
      if (!line) {
        if (cur) { out.push(cur); cur = null; }
        continue;
      }
      if (cur) {
        if (HEADER_RE.test(line)) {
          out.push(cur);
          const h = parseHeader(line);
          cur = h ? {...h, body: []} : null;
        } else {
          cur.body.push(line.replace(/^ {1,4}/, ''));
        }
      } else {
        const h = parseHeader(line);
        if (h) cur = {...h, body: []};
      }
    }
    if (cur) out.push(cur);
    return out;
  }

  function classForKind(kind) {
    if (kind === 'OPEN' || kind === 'SCAFFOLD') return 'comms-open';
    if (kind === 'UPDATE') return 'comms-update';
    if (kind === 'CLOSING' || kind === 'ABANDONED') return 'comms-closing';
    if (kind.startsWith('→') || kind.startsWith('->')) return 'comms-dialog';
    return 'comms-open';
  }

  function splitWho(who) {
    const m = /^([a-z][a-z0-9_]*)-([a-f0-9]{8})$/i.exec(who);
    if (m) return {actor: m[1].toLowerCase(), sid8: m[2]};
    return {actor: who.toLowerCase(), sid8: ''};
  }

  // S043 follow-up: fold body[0] into the header so the collapsed view is
  // informative. New comms discipline targets one-line conversational bodies —
  // for those the header IS the full content and no ▸ appears.
  const HEADER_PREVIEW_CHARS = 90;
  function buildHeaderText(entry) {
    if (entry.body.length === 0) return entry.kind;
    const first = entry.body[0];
    const truncated = first.length > HEADER_PREVIEW_CHARS;
    const preview = truncated
      ? first.slice(0, HEADER_PREVIEW_CHARS - 1).trimEnd() + '…'
      : first;
    return `${entry.kind} — ${preview}`;
  }
  function hasHiddenDetail(entry) {
    if (entry.body.length === 0) return false;
    if (entry.body.length > 1) return true;
    return entry.body[0].length > HEADER_PREVIEW_CHARS;
  }

  function renderEntry(entry, origin) {
    const {actor, sid8} = splitWho(entry.who);
    const speaker = ['jebrim','zezima','wisp','braindead','guthix'].includes(actor) ? actor : 'system';
    const displayName = actor.charAt(0).toUpperCase() + actor.slice(1)
                      + (sid8 ? ` · ${sid8}` : '');
    const headerCls = classForKind(entry.kind);
    const entryId = entryKey(entry);
    const headerEl = logChatLine(displayName, buildHeaderText(entry), headerCls, speaker);
    if (hasHiddenDetail(entry) && headerEl) {
      headerEl.classList.add('comms-toggleable');
      headerEl.setAttribute('data-comms-entry', entryId);
      headerEl.addEventListener('click', () => {
        const open = headerEl.classList.toggle('expanded');
        document.querySelectorAll(
          `.comms-body[data-comms-entry="${CSS.escape(entryId)}"]`
        ).forEach(b => b.classList.toggle('show', open));
      });
      for (const line of entry.body) {
        const li = document.createElement('div');
        li.className = 'log-entry comms-body';
        li.setAttribute('data-speaker', speaker);
        li.setAttribute('data-comms-entry', entryId);
        li.innerHTML = `<span class="t">·</span>${escapeHtml(line)}`;
        appendLogEntry(li);
      }
    }
  }

  function entryKey(entry) {
    return `${entry.ts}|${entry.who}|${entry.kind}`;
  }

  async function pollOne(src) {
    try {
      const res = await fetch(src.url + '?_=' + Date.now(), {cache: 'no-store'});
      if (!res.ok) return;
      const text = await res.text();
      const entries = parseEntries(text);
      if (!primed[src.origin]) {
        const tail = entries.slice(-6);
        for (const e of entries) seen[src.origin].add(entryKey(e));
        for (const e of tail) renderEntry(e, src.origin);
        primed[src.origin] = true;
        return;
      }
      for (const e of entries) {
        const k = entryKey(e);
        if (seen[src.origin].has(k)) continue;
        seen[src.origin].add(k);
        renderEntry(e, src.origin);
      }
    } catch (_) {
      // Mirror file may not exist yet (sidecar hasn't fired) — silent retry.
    }
  }

  async function pollAll() {
    for (const src of SOURCES) {
      await pollOne(src);
    }
  }

  pollAll();
  setInterval(pollAll, POLL_MS);
})();

</script>
</body>
</html>
