ading slowly is worth doing.\n\nZezima is not Niklavs. Zezima acts on Niklavs' behalf in domains where speed is the wrong virtue — where the work is *thinking*, not *executing*. He sits with things. He notices what wasn't asked.\n\n**What he handles.**\n\n- Reading and reflection on what's been read.\n- Personal life — relationships, decisions, life-design questions, things-Niklavs-is-chewing-on.\n- Slow synthesis. Connections across weeks or months.\n\n**What he doesn't handle.**\n\n- Work-flavored execution. That's Jebrim's domain.\n- Anything urgent or extractive. If the task is \"give me the answer fast,\" Zezima is the wrong player.\n\n**How he grows.** Through use. The texture of Zezima — what he notices, how he frames things, what he holds onto — accumulates in his `examine/`, `niksis8_character/`, and `bank/`. The seed is small on purpose; what he becomes is what gets confirmed.\n\n## Related\n\n- `persona.md` — how he speaks.\n- `CLAUDE.md` — his session-level instructions.\n- `players/_about.md` — the players system and how he fits.\n", "purpose": "Character card for Zezima — names domain (personal life / reading / reflection) and the slow-synthesis register.", "drift": true, "reason": "Character framing is interpretive. The 'Zezima as the legendary-player register' metaphor (patience, depth, long horizons) and the personal-vs-work split are the builder's choices.", "ext": ".md", "name": "_about.md"}, "players/zezima/bank/_about.md": {"content": "# Zezima — bank/\n\n**Cognitive role.** Semantic memory. What Zezima knows that's worth keeping across sessions.\n\n**Metaphor.** The bank: items sorted, kept, withdrawn on demand, reorganized during bankstanding.\n\n## What goes here\n\n- Notes from books, articles, essays Niklavs reads through Zezima.\n- Connections across readings — synthesis that survives a single session.\n- Reflection-derived knowledge: \"I've noticed that [pattern] in my own life across these contexts.\"\n- Reference material Zezima needs at hand: lists of works, recurring themes, ongoing reading projects.\n\n## What does not go here\n\n- Today-only context. That's `inventory/`.\n- Session narrative. That's `quest-log/`.\n- Self-observations. That's `examine/`.\n- Observations about Niklavs as a person. That's `niksis8_character/`.\n\n## Structure\n\n```\nbank/\n  _about.md\n  notes/                # the active knowledge graph (markdown, freely wiki-linked)\n  archive/              # mirrors notes/ — superseded notes preserved here\n```\n\nFree to subfolder `notes/` by topic as it grows. No pre-imposed taxonomy.\n\n## Write rules\n\nAuto-write. Zezima writes to `bank/notes/` freely as he works. Overturning existing knowledge requires a draft in `lorebook/drafts/` (because changing a confirmed fact is a decision, not just a note). See `gielinor/meta/write-rules.md`.\n\n## Related\n\n- `gielinor/spellbook/rituals/bankstanding.md` for periodic review.\n- `quest-log/` (Zezima's) for the session entries that may graduate into bank notes.\n", "purpose": "Layer card for Zezima's semantic memory — defines what knowledge accumulates (reading notes, cross-source synthesis, reflection-derived patterns).", "drift": true, "reason": "_about framing. The 'no pre-imposed taxonomy in notes/' choice is a structure decision — confirm you want notes/ free-form vs subdivided.", "ext": ".md", "name": "_about.md"}, "players/zezima/examine/_about.md": {"content": "# Zezima — examine/\n\n**Cognitive role.** Zezima's self-knowledge as a character.\n\n**Scope.** Per-player. This is what Zezima has noticed and confirmed about *himself* — the patterns in how he reflects, the failure modes of his own reasoning, the calibrations specific to him as a character.\n\nThe agent-system-level self-model lives in `gielinor/examine/`. This file is *Zezima's lens*, not the system's.\n\n## What goes here\n\n- Patterns in how Zezima approaches reflection and reading.\n- Failures specific to Zezima — places where his unhurried register caused him to miss something time-sensitive, or where his slowness was the right move.\n- Confirmed working agreements that apply when Niklavs is operating through Zezima specifically.\n\n## What does not go here\n\n- System-level patterns about the agent overall — those go in `gielinor/examine/`.\n- Observations about Niklavs — those go in `niksis8_character/` (player-scoped) or `gielinor/niksis8/` (universal).\n\n## Structure\n\nSame as global examine:\n\n```\nexamine/\n  _about.md\n  drafts/\n  confirmed/\n    current.md\n  archive/\n  rejected/\n```\n\n## Write rules\n\nDrafts auto-write. Promotions to `confirmed/` and edits to `current.md` are user-only and hook-enforced. See `gielinor/meta/write-rules.md` and `gielinor/meta/drafts-mechanics.md`.\n\n## Rejected drafts are data\n\n`rejected/` is kept on purpose. A repeated pattern in Zezima's rejections means the agent's model of what's worth recording *about Zezima* is miscalibrated. Bankstanding surfaces these patterns and may propose updates to Zezima's working agreements, or graduate the pattern to the global `examine/` if it turns out to be system-level rather than character-specific.\n\n## Related\n\n- `gielinor/examine/` for the system-level self-model.\n- `gielinor/meta/drafts-mechanics.md` for the observation rule.\n", "purpose": "Layer card for Zezima's per-character self-knowledge — distinguishes from gielinor/examine/ (system-level).", "drift": true, "reason": "_about framing — same boundary call as the global examine/_about.md, applied per-player.", "ext": ".md", "name": "_about.md"}, "players/zezima/inventory/_about.md": {"content": "# Zezima — inventory/\n\n**Cognitive role.** Working memory. What Zezima is carrying *right now* — volatile, session-scoped, lost on death.\n\n**Metaphor.** The 28 inventory slots in RuneScape: limited, active, must be managed; dropped on death.\n\n## What goes here\n\n- Open threads carried across turns within a session.\n- Today-only context that doesn't belong in bank.\n- Working drafts of synthesis that isn't ready to land anywhere yet.\n\n## What does not go here\n\n- Anything that should survive a reset. (Use `bank/` or get it confirmed in `examine/`/`niksis8_character/`.)\n- Narrative session content. (Use `quest-log/`.)\n\n## Structure\n\nFlat. One file per active piece of working memory. Filenames descriptive. No subfolders required.\n\n```\ninventory/\n  _about.md\n  <free-form files as needed>\n```\n\n## Write rules\n\nAuto-write. Volatile by design. See `gielinor/meta/write-rules.md` and `gielinor/meta/death-and-spawn.md`.\n\n## Discipline\n\n- Don't let inventory accumulate. If something's worth keeping past today, move it to `bank/` or propose it as an identity-layer draft.\n- Inventory is *carried* — meaning the agent looks at it each turn. If you don't need to look at it, it doesn't belong here.\n", "purpose": "Layer card for Zezima's working memory — volatile, session-scoped; defines the don't-let-accumulate discipline.", "drift": true, "reason": "_about framing. The 'if you don't look at it each turn, it doesn't belong here' rule is a working-memory discipline call.", "ext": ".md", "name": "_about.md"}, "players/zezima/keepsake/current.md": {"content": "# Zezima — keepsake/current.md\n\n> Read at respawn (when Zezima is active). Pinned items that must surface every Zezima session. Under size budget (~2k tokens). User-only; the agent proposes via `proposals/`.\n\n*(empty — pins land here as the principal decides what's always-on for Zezima)*\n", "purpose": "Identity-layer read target — Zezima's pins, loaded at respawn when Zezima is active (step 7d).", "drift": false, "reason": "", "ext": ".md", "name": "current.md"}, "players/zezima/keepsake/_about.md": {"content": "# Zezima — keepsake/\n\n**Cognitive role.** Player-scoped valence. Items that always matter when Zezima is active.\n\n**Scope.** Per-player. Cross-player always-surface items live in `gielinor/keepsake/`. This holds pins that matter *specifically* when Niklavs is working through Zezima.\n\n## What goes here\n\n- Things Zezima must always surface or honor when he's the active player.\n- Ongoing reflective threads. Life-design questions Niklavs is in the middle of.\n- Currently-load-bearing readings or projects.\n\nSmall. Pinning is intentional. The global keepsake covers the truly always-on items.\n\n## Structure\n\n```\nkeepsake/\n  _about.md\n  current.md           # the active pin list\n  proposals/           # agent-proposed pins, awaiting Niklavs' decision\n  archive/             # items rotated out\n```\n\n## Write rules\n\nProposals are auto-write to `proposals/`. Pinning into `current.md` is user-only. See `gielinor/meta/write-rules.md`.\n\n`current.md` has a placeholder size budget (~2k tokens). Bankstanding proposes rotations.\n\n## Related\n\n- `gielinor/keepsake/` for cross-player pins.\n- `gielinor/spellbook/rituals/bankstanding.md` for the rotation review.\n", "purpose": "Layer card for Zezima's player-scoped pins — items that always surface when Zezima is active.", "drift": true, "reason": "_about framing — applies the global-keepsake principle (small, intentional) per-player.", "ext": ".md", "name": "_about.md"}, "players/zezima/niksis8_character/_about.md": {"content": "# Zezima — niksis8_character/\n\n**Cognitive role.** What Zezima knows about Niklavs through *his* relationship — the per-player lens on the user.\n\n**Scope.** Per-player. Universal facts about Niklavs live in `gielinor/niksis8/`. This is what Zezima specifically has learned about him.\n\n## What goes here\n\n- Things about Niklavs that show up *in the reflective register* — what he wrestles with when he slows down, what kinds of reading he keeps coming back to, what patterns he notices in his own personal life.\n- Communication preferences that show up when he's working through Zezima specifically (which may differ from his preferences with Jebrim).\n\n## What does not go here\n\n- Facts about Niklavs that hold regardless of player — those go in `gielinor/niksis8/`.\n- Observations about Zezima himself — that's `examine/`.\n- Day-to-day life context. That's `inventory/` or `bank/` depending on durability.\n\n## Structure\n\n```\nniksis8_character/\n  _about.md\n  drafts/\n  confirmed/\n    current.md\n  archive/\n  rejected/\n```\n\n## Write rules\n\nDrafts auto-write. Promotions are user-only and hook-enforced. See `gielinor/meta/write-rules.md`.\n\n## Rejected drafts are data\n\n`rejected/` is kept on purpose. A repeated pattern in what Zezima's model-of-Niklavs gets wrong — the same kind of reflective-register inference proposed and turned down again — means Zezima is mis-reading Niklavs in a specific way. Bankstanding surfaces these patterns; a recurring rejection may itself be the observation worth confirming (e.g., \"Zezima keeps assuming Niklavs is unresolved on X when he's actually just sitting with it on purpose\").\n\n## Related\n\n- `gielinor/niksis8/` for the universal model.\n- `gielinor/meta/drafts-mechanics.md` for the observation rule.\n", "purpose": "Layer card for Zezima's per-character model of Niklavs — what Zezima knows about Niklavs through the reflective lens.", "drift": true, "reason": "_about framing. The 'reflective-register view of Niklavs' framing is interpretive — confirm it's the right slicing of user-model knowledge.", "ext": ".md", "name": "_about.md"}, "players/zezima/quest-log/_about.md": {"content": "# Zezima — quest-log/\n\n**Cognitive role.** Episodic memory. What happened in each session, in narrative form.\n\n**Metaphor.** A quest journal: time-bound narrative arcs, started and completed, sometimes paused.\n\n## Structure\n\n```\nquest-log/\n  _about.md\n  in-progress/          # active sessions; appended every turn\n  completed/            # finished session entries\n  archive/              # abandoned in-progress entries, plus aged completed entries\n```\n\nOne file per session. Filename: `YYYY-MM-DD_<slug>.md`. Date is the session start date.\n\n## Discipline (critical for crash recovery)\n\n- A session log appends to `in-progress/` **every turn**, not at session end.\n- Every external action logs as `pending` before execution, updated to `completed` or `failed` after.\n- On clean session end, the file moves from `in-progress/` to `completed/`.\n- On crash, the file stays in `in-progress/` and is the recovery target — the respawn ritual surfaces it.\n\nSee `gielinor/meta/death-and-spawn.md` for the full crash-recovery story.\n\n## What goes in a session entry\n\n- Narrative: what the principal asked, what was done, what was said.\n- Decisions made within the session.\n- Open threads, hand-offs, follow-ups.\n- Pending/completed/failed action markers.\n\n## What does not go in a session entry\n\n- Reference knowledge — that's `bank/`. (A session may *produce* knowledge worth banking; the bankstanding ritual proposes it later.)\n- Self-observations — that's `examine/drafts/`.\n\n## Write rules\n\nAuto-write. The session logs itself. See `gielinor/meta/write-rules.md`.\n\n## Related\n\n- `gielinor/spellbook/rituals/respawn.md` for how in-progress entries are recovered.\n- `gielinor/spellbook/rituals/bankstanding.md` for graduating session insights to bank.\n", "purpose": "Layer card for Zezima's episodic memory — defines the every-turn-append discipline and the pending/completed/failed action markers.", "drift": true, "reason": "_about framing AND load-bearing operational rules — same crash-recovery substrate as Jebrim's quest-log. Confirm the discipline is right; mirror-content with Jebrim's version is intentional.", "ext": ".md", "name": "_about.md"}, "players/zezima/spellbook/_about.md": {"content": "# Zezima — spellbook/\n\n**Cognitive role.** Procedural memory. How Zezima does things — the procedures specific to him as a character.\n\n**Metaphor.** Player-specific entries in his spellbook. The global rituals (respawn, bankstanding) live in `gielinor/spellbook/`; this is for Zezima's own moves.\n\n## What goes here\n\n- **Skills** (`skills/`): procedures Zezima invokes for his work — a reading-reflection skill, a synthesis-across-books skill, etc. Mostly empty Phase 1; grows from real use.\n- **Rituals** (`rituals/`): character-specific named procedures. Rare. Most rituals are global.\n\n## Structure\n\n```\nspellbook/\n  _about.md\n  skills/               # Zezima's skills (empty Phase 1)\n  rituals/              # character-specific rituals (rare; empty Phase 1)\n  archive/              # superseded skills/rituals\n```\n\n## Write rules\n\n- `skills/` — draft-then-approve. New skills go through `gielinor/lorebook/drafts/` since adding a procedure is a decision worth recording.\n- `rituals/` — user-only.\n\nSee `gielinor/meta/write-rules.md`.\n\n## Related\n\n- `gielinor/spellbook/_about.md` for the global rituals/skills.\n", "purpose": "Layer card for Zezima's procedural memory — distinguishes skills (procedures) from rituals (rare, character-specific).", "drift": true, "reason": "_about framing — mirrors Jebrim's spellbook/_about.md. Confirm the 'don't write speculative skills' discipline.", "ext": ".md", "name": "_about.md"}, "players/zezima/spellbook/archive/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/spellbook/rituals/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/spellbook/skills/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/quest-log/archive/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/quest-log/completed/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/quest-log/in-progress/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/niksis8_character/archive/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/niksis8_character/confirmed/current.md": {"content": "# Zezima — niksis8_character/confirmed/current.md\n\n> Read at respawn (when Zezima is active). What Zezima knows about Niklavs through their relationship. Under size budget (~3k tokens). User-only; the agent proposes via `drafts/`.\n\n*(empty — grows through observation-backed drafts)*\n", "purpose": "Identity-layer read target — loaded at respawn when Zezima is active (step 7f).", "drift": false, "reason": "", "ext": ".md", "name": "current.md"}, "players/zezima/niksis8_character/drafts/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/niksis8_character/rejected/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/keepsake/archive/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/keepsake/proposals/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/examine/archive/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/examine/confirmed/current.md": {"content": "# Zezima — examine/confirmed/current.md\n\n> Read at respawn (when Zezima is active). The rolling, in-force self-model for Zezima as a character. Under size budget (~3k tokens). User-only; the agent proposes via `drafts/`.\n\n*(empty — grows through observation-backed drafts)*\n", "purpose": "Identity-layer read target — loaded at respawn when Zezima is active (step 7e).", "drift": false, "reason": "", "ext": ".md", "name": "current.md"}, "players/zezima/examine/drafts/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/examine/rejected/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/bank/archive/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/zezima/bank/notes/.gitkeep": {"content": "", "purpose": "Empty directory marker — keeps the empty scaffolding folder in git so structure survives clones.", "drift": false, "reason": "", "ext": "", "name": ".gitkeep"}, "players/jebrim/bank/_about.md": {"content": "# Jebrim — bank/\n\n**Cognitive role.** Semantic memory. What Jebrim knows about the work — the knowledge graph that supports analytical execution.\n\n**Metaphor.** The bank: items sorted, kept, withdrawn on demand, reorganized during bankstanding.\n\n## Source repos\n\nJebrim's bank grows from **real working repos**, not via one-shot ingestion:\n\n- `Documents/bi-analytics-main/NFE/`\n- `Documents/bi-etl/`\n\nThe discipline: when Jebrim is working on a real task in one of those repos, he captures the relevant knowledge into `bank/notes/` as markdown notes that **link back to source paths**. The bank holds the knowledge graph; the repos remain the source of truth for code and configs.\n\nA note about a query, for example, summarizes the query's purpose, inputs, outputs, and gotchas — and links to the source `.sql` file at its actual path. When the query changes, the note may need updating, and bankstanding catches drift.\n\n## What goes here\n\n- Knowledge about specific reports, queries, models, ETL pipelines, BI artifacts.\n- Cross-cutting work knowledge: data sources, naming conventions, common pitfalls, recurring stakeholder asks.\n- Procedures that are too specific to be `spellbook/` skills but too durable to be `inventory/`.\n\n## What does not go here\n\n- Today-only working state. That's `inventory/`.\n- Session narrative. That's `quest-log/`.\n- The code itself — that stays in the source repos. Bank holds notes *about* the code.\n\n## Structure\n\n```\nbank/\n  _about.md\n  notes/                # the active knowledge graph\n    <free subfolders by domain — reports/, queries/, pipelines/, etc.>\n  archive/              # mirrors notes/\n```\n\n## Write rules\n\nAuto-write. Jebrim writes to `bank/notes/` freely as he works. Overturning existing knowledge requires a draft in `gielinor/lorebook/drafts/`. See `gielinor/meta/write-rules.md`.\n\n## Discipline\n\n- Every note that's about a repo artifact should include the **absolute or repo-relative path** to the source.\n- When you can't find an existing note for something you're learning, write one. Bias toward capture.\n- When you find a note that's contradicted by what you just learned, don't silently update — surface the contradiction as a lorebook draft if it's load-bearing, or just archive the old note if it's stale.\n\n## Related\n\n- `gielinor/spellbook/rituals/bankstanding.md` for periodic review.\n- `quest-log/` (Jebrim's) for session entries that may graduate into bank notes.\n", "purpose": "Layer card for Jebrim's semantic memory — defines bank-grows-from-real-repos, source-path discipline, and the contradiction-handling rule.", "drift": true, "reason": "_about framing. The 'every note links back to source path' discipline and the explicit naming of bi-analytics-main/NFE/ and bi-etl/ as source repos are interpretive. Confirm both.", "ext": ".md", "name": "_about.md"}, "players/jebrim/examine/_about.md": {"content": "# Jebrim — examine/\n\n**Cognitive role.** Jebrim's self-knowledge as a character.\n\n**Scope.** Per-player. Agent-system-level self-model lives in `gielinor/examine/`.\n\n## What goes here\n\n- Patterns in how Jebrim approaches analytical work — where his bias toward terseness helps, where it hurts.\n- Failures specific to Jebrim — places where his execution-first register caused him to skip a reflection that mattered, or where his focus was the right move.\n- Confirmed working agreements that apply when Niklavs is operating through Jebrim specifically.\n\n## What does not go here\n\n- System-level patterns — those go in `gielinor/examine/`.\n- Observations about Niklavs — those go in `niksis8_character/` or `gielinor/niksis8/`.\n\n## Structure\n\n```\nexamine/\n  _about.md\n  drafts/\n  confirmed/\n    current.md\n  archive/\n  rejected/\n```\n\n## Write rules\n\nDrafts auto-write. Promotions to `confirmed/` and edits to `current.md` are user-only and hook-enforced. See `gielinor/meta/write-rules.md` and `gielinor/meta/drafts-mechanics.md`.\n\n## Rejected drafts are data\n\n`rejected/` is kept on purpose. A repeated pattern in Jebrim's rejections means the agent's model of what's worth recording *about Jebrim* is miscalibrated. Bankstanding surfaces these patterns and may propose updates to Jebrim's working agreements, or graduate the pattern to the global `examine/` if it turns out to be system-level rather than character-specific.\n\n## Related\n\n- `gielinor/examine/` for the system-level self-model.\n- `gielinor/meta/drafts-mechanics.md` for the observation rule.\n", "purpose": "Layer card for Jebrim's per-character self-knowledge — distinguishes from gielinor/examine/ (system-level).", "drift": true, "reason": "_about framing — same boundary call as the global examine/_about.md, applied per-player.", "ext": ".md", "name": "_about.md"}, "players/jebrim/inventory/_about.md": {"content": "# Jebrim — inventory/\n\n**Cognitive role.** Working memory. What Jebrim is carrying right now — volatile, session-scoped, lost on death.\n\n**Metaphor.** The 28 inventory slots in RuneScape.\n\n## What goes here\n\n- Open threads carried across turns within a session.\n- Today's working state — the specific report being built, the stakeholder waiting for an answer, the query whose output is being inspected.\n- Working drafts of an analysis that isn't ready to land in `bank/notes/` yet.\n\n## What does not go here\n\n- Anything that should survive a reset. (Use `bank/` or get it confirmed.)\n- Narrative session content. (Use `quest-log/`.)\n\n## Structure\n\nFlat. One file per active piece of working memory. Filenames descriptive.\n\n```\ninventory/\n  _about.md\n  <free-form files as needed>\n```\n\n## Write rules\n\nAuto-write. Volatile by design. See `gielinor/meta/write-rules.md` and `gielinor/meta/death-and-spawn.md`.\n\n## Discipline\n\n- If something carries across more than two sessions, it probably belongs in `bank/`, not inventory. Promote it.\n- If something hasn't been touched in a session, drop it (the agent isn't actually carrying it).\n", "purpose": "Layer card for Jebrim's working memory — volatile, session-scoped; defines the promote-to-bank-or-drop discipline.", "drift": true, "reason": "_about framing. The 'if it crosses two sessions, promote to bank' threshold is a discipline call.", "ext": ".md", "name": "_about.md"}, "players/jebrim/keepsake/current.md": {"content": "# Jebrim — keepsake/current.md\n\n> Read at respawn (when Jebrim is active). Pinned items that must surface every Jebrim session. Under size budget (~2k tokens). User-only; the agent proposes via `proposals/`.\n\n*(empty — pins land here as the principal decides what's always-on for Jebrim)*\n", "purpose": "Identity-layer read target — Jebrim's pins, loaded at respawn when Jebrim is active (step 7d).", "drift": false, "reason": "", "ext": ".md", "name": "current.md"}, "players/jebrim/keepsake/_about.md": {"content": "# Jebrim — keepsake/\n\n**Cognitive role.** Player-scoped valence. Items that always matter when Jebrim is active.\n\n**Scope.** Per-player. Cross-player always-surface items live in `gielinor/keepsake/`.\n\n## What goes here\n\n- Things Jebrim must always surface when he's active.\n- Currently load-bearing work projects, deadlines, or stakeholder commitments.\n- Lines that must not be crossed in the work context (e.g., \"Don't push to main without review.\")\n\nSmall. Pinning is intentional.\n\n## Structure\n\n```\nkeepsake/\n  _about.md\n  current.md           # the active pin list\n  proposals/           # agent-proposed pins\n  archive/             # items rotated out\n```\n\n## Write rules\n\nProposals auto-write to `proposals/`. Pinning into `current.md` is user-only. See `gielinor/meta/write-rules.md`.\n\n`current.md` has a placeholder size budget (~2k tokens). Bankstanding proposes rotations.\n\n## Related\n\n- `gielinor/keepsake/` for cross-player pins.\n- `gielinor/spellbook/rituals/bankstanding.md`.\n", "purpose": "Layer card for Jebrim's player-scoped pins — items that always surface when Jebrim is active.", "drift": true, "reason": "_about framing — applies the global-keepsake principle (small, intentional) per-player.", "ext": ".md", "name": "_about.md"}, "players/jebrim/niksis8_character/_about.md": {"content": "# Jebrim — niksis8_character/\n\n**Cognitive role.** What Jebrim knows about Niklavs through *his* relationship — the per-player lens on the user.\n\n**Scope.** Per-player. Universal facts live in `gielinor/niksis8/`.\n\n## What goes here\n\n- Things about Niklavs that show up *in the work register* — how he frames a task, what he wants in a deliverable, how he expects to be challenged.\n- Stakeholder context: who Niklavs is working with at any given time, what their needs are, how Niklavs prefers to mediate between them and the work.\n- Communication preferences in the work register specifically — which may differ from his preferences with Zezima.\n\n## What does not go here\n\n- Facts about Niklavs that hold regardless of player — `gielinor/niksis8/`.\n- Observations about Jebrim himself — `examine/`.\n- Today's work state — `inventory/` or `bank/`.\n\n## Structure\n\n```\nniksis8_character/\n  _about.md\n  drafts/\n  confirmed/\n    current.md\n  archive/\n  rejected/\n```\n\n## Write rules\n\nDrafts auto-write. Promotions are user-only and hook-enforced. See `gielinor/meta/write-rules.md`.\n\n## Rejected drafts are data\n\n`rejected/` is kept on purpose. A repeated pattern in what Jebrim's model-of-Niklavs gets wrong — the same kind of work-register inference proposed and turned down again — means Jebrim is mis-reading Niklavs in a specific way. Bankstanding surfaces these patterns; a recurring rejection may itself be the observation worth confirming (e.g., \"Jebrim keeps assuming Niklavs wants closure-via-deliverable when he actually wants closure-via-clarity\").\n\n## Related\n\n- `gielinor/niksis8/` for the universal model.\n- `gielinor/meta/drafts-mechanics.md` for the observation rule.\n", "purpose": "Layer card for Jebrim's per-character model of Niklavs — what Jebrim knows about Niklavs through the work lens.", "drift": true, "reason": "_about framing. The 'work-register view of Niklavs' framing is interpretive — confirm it's the right slicing of user-model knowledge.", "ext": ".md", "name": "_about.md"}, "players/jebrim/quest-log/_about.md": {"content": "# Jebrim — quest-log/\n\n**Cognitive role.** Episodic memory. What happened in each session, in narrative form.\n\n**Metaphor.** A quest journal: time-bound narrative arcs, started and completed, sometimes paused.\n\n## Structure\n\n```\nquest-log/\n  _about.md\n  in-progress/          # active sessions; appended every turn\n  completed/            # finished session entries\n  archive/              # abandoned in-progress entries, plus aged completed entries\n```\n\nOne file per session. Filename: `YYYY-MM-DD_<slug>.md`.\n\n## Discipline (critical for crash recovery)\n\n- A session log appends to `in-progress/` **every turn**.\n- Every external action logs as `pending` before execution, updated to `completed` or `failed` after.\n- On clean session end, file moves from `in-progress/` to `completed/`.\n- On crash, file stays in `in-progress/` and is the recovery target.\n\nSee `gielinor/meta/death-and-spawn.md`.\n\n## What goes in a session entry\n\n- Narrative: the ask, the work done, the answer delivered.\n- Deliverables produced or queries run, with their results or output paths.\n- Open threads, hand-offs, follow-ups.\n- Pending/completed/failed action markers.\n\n## What does not go in a session entry\n\n- Reference knowledge — `bank/`. Sessions may *produce* bankable knowledge; bankstanding proposes the transfer.\n- Self-observations — `examine/drafts/`.\n\n## Write rules\n\nAuto-write. See `gielinor/meta/write-rules.md`.\n\n## Related\n\n- `gielinor/spellbook/rituals/respawn.md` for in-progress recovery.\n- `gielinor/spellbook/rituals/bankstanding.md` for graduating session insights to bank.\n", "purpose": "Layer card for Jebrim's episodic memory — defines the every-turn-append discipline and the pending/completed/failed action markers.", "drift": true, "reason": "_about framing AND load-bearing operational rules. The 'every turn' append rule and the pending-marker discipline are the crash-recovery substrate (see meta/death-and-spawn.md). Confirm the discipline is right.", "ext": ".md", "name": "_about.md"}, "players/jebrim/spellbook/_about.md": {"content": "# Jebrim — spellbook/\n\n**Cognitive role.** Procedural memory. How Jebrim does things — the procedures specific to him.\n\n**Metaphor.** Player-specific entries in his spellbook. Global rituals live in `gielinor/spellbook/`.\n\n## What goes here\n\n- **Skills** (`skills/`): procedures Jebrim invokes — running a recurring BI report, doing a standard ETL fix, generating a stakeholder summary, etc. Mostly empty Phase 1; grows from real use.\n- **Rituals** (`rituals/`): character-specific named procedures. Rare. Most rituals are global.\n\n## Structure\n\n```\nspellbook/\n  _about.md\n  skills/               # Jebrim's skills (empty Phase 1)\n  rituals/              # character-specific rituals (rare; empty Phase 1)\n  archive/              # superseded skills/rituals\n```\n\n## Write rules\n\n- `skills/` — draft-then-approve via `gielinor/lorebook/drafts/`.\n- `rituals/` — user-only.\n\nSee `gielinor/meta/write-rules.md`.\n\n## Discipline\n\nWhen a recurring work task settles into a stable shape — same inputs, same steps, same shape of output — propose it as a skill. Don't write speculative skills; write skills for procedures that have already happened a few times.\n\n## Related\n\n- `gielinor/spellbook/_about.md` for the global rituals/skills.\n", "purpose": "Layer card for Jebrim's procedural memory — distinguishes skills (procedures) from rituals (rare, character-specific).", "drift": true, "reason": "_about framing. The 'don't write speculative skills; propose them after the procedure has happened a few times' discipline is a judgment call worth verifying." <script>

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

const DATA = window.__GIELINOR__;
let currentPath = null;
let rawMode = false;

// ---- Tree ----
function buildTree(dir, container, depth) {
  const children = DATA.dirs[dir] || [];
  for (const name of children) {
    const childPath = dir ? `${dir}/${name}` : name;
    const isDir = DATA.dirs[childPath] !== undefined;
    if (isDir) {
      const row = document.createElement('div');
      row.className = 'row dir';
      row.dataset.dir = childPath;
      row.style.paddingLeft = (8 + depth * 12) + 'px';
      row.innerHTML = `<span class="caret">▸</span><span class="name">${escapeHtml(name)}/</span>`;
      row.addEventListener('click', (e) => {
        e.stopPropagation();
        row.classList.toggle('open');
        const caret = row.querySelector('.caret');
        caret.textContent = row.classList.contains('open') ? '▾' : '▸';
      });
      container.appendChild(row);
      const wrap = document.createElement('div');
      wrap.className = 'children';
      container.appendChild(wrap);
      buildTree(childPath, wrap, depth + 1);
    } else {
      const meta = DATA.files[childPath];
      const row = document.createElement('div');
      row.className = 'row file' + (meta.drift ? ' has-drift' : '');
      row.dataset.path = childPath;
      row.style.paddingLeft = (8 + depth * 12 + 14) + 'px';
      const badge = meta.drift ? '<span class="badge">DRIFT</span>' : '';
      row.innerHTML = `<span class="name">${escapeHtml(name)}</span>${badge}`;
      row.addEventListener('click', (e) => {
        e.stopPropagation();
        openFile(childPath);
      });
      container.appendChild(row);
    }
  }
}

function expandToPath(path) {
  const parts = path.split('/');
  let cur = '';
  for (let i = 0; i < parts.length - 1; i++) {
    cur = cur ? `${cur}/${parts[i]}` : parts[i];
    const row = $(`.tree .row.dir[data-dir="${cssEscape(cur)}"]`);
    if (row && !row.classList.contains('open')) {
      row.classList.add('open');
      const caret = row.querySelector('.caret');
      if (caret) caret.textContent = '▾';
    }
  }
}

function cssEscape(s) { return s.replace(/"/g, '\\"'); }

// ---- File view ----
function openFile(path) {
  currentPath = path;
  rawMode = false;
  $$('.tree .row.active').forEach(r => r.classList.remove('active'));
  const row = $(`.tree .row.file[data-path="${cssEscape(path)}"]`);
  if (row) {
    row.classList.add('active');
    row.scrollIntoView({ block: 'nearest' });
  }
  expandToPath(path);
  renderFile(path);
}

function renderFile(path) {
  const meta = DATA.files[path];
  if (!meta) {
    renderLanding();
    return;
  }
  const drift = meta.drift ? `
    <div class="drift">
      <span class="label">⚑ Drift flag</span>
      <div>${escapeHtml(meta.reason)}</div>
    </div>` : '';

  const ext = meta.ext;
  let contentHtml;
  if (rawMode || ext === '.json' || ext === '.py') {
    contentHtml = renderCode(meta.content, ext);
  } else if (ext === '.md') {
    contentHtml = `<div class="md">${renderMarkdown(meta.content)}</div>`;
  } else {
    contentHtml = renderCode(meta.content, ext);
  }

  const toggle = (ext === '.md')
    ? `<span class="raw-toggle ${rawMode ? 'active' : ''}" id="raw-toggle">${rawMode ? 'rendered' : 'raw'}</span>`
    : '';

  const main = $('#main');
  main.innerHTML = `
    <div class="path-bar"><code>gielinor/${escapeHtml(path)}</code></div>
    <div class="file-head">
      <h1>${escapeHtml(meta.name)}${toggle}</h1>
    </div>
    <div class="purpose">
      <span class="label">Purpose</span>
      <div>${escapeHtml(meta.purpose)}</div>
    </div>
    ${drift}
    <div class="section-head">File contents</div>
    ${contentHtml}
  `;
  if (ext === '.md') {
    const t = $('#raw-toggle');
    if (t) t.addEventListener('click', () => { rawMode = !rawMode; renderFile(path); });
  }
  // Wire xref clicks
  $$('.xref').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const target = a.dataset.target;
      if (target && DATA.files[target]) {
        openFile(target);
      }
    });
  });
  main.scrollTop = 0;
}

// ---- Markdown rendering (lightweight) ----
function renderMarkdown(src) {
  // Pull out fenced code blocks first, replace with placeholders.
  const blocks = [];
  src = src.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
    const i = blocks.length;
    blocks.push({ lang, code });
    return `\x00CODE${i}\x00`;
  });

  // Tables (very simple).
  src = src.replace(/((?:^\|.+\|\s*$\n?)+)/gm, (m) => {
    const lines = m.trim().split('\n').map(l => l.trim());
    if (lines.length < 2) return m;
    const sep = lines[1];
    if (!/^\|[\s\-:|]+\|$/.test(sep)) return m;
    const header = lines[0].slice(1, -1).split('|').map(c => c.trim());
    const rows = lines.slice(2).map(l => l.slice(1, -1).split('|').map(c => c.trim()));
    let html = '<table><thead><tr>' + header.map(h => `<th>${inlineMd(h)}</th>`).join('') + '</tr></thead><tbody>';
    rows.forEach(r => {
      html += '<tr>' + r.map(c => `<td>${inlineMd(c)}</td>`).join('') + '</tr>';
    });
    html += '</tbody></table>';
    return html;
  });

  // Split into block-level units by blank lines (preserving table HTML).
  const lines = src.split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];

    // Headings
    const hm = /^(#{1,6})\s+(.*)$/.exec(line);
    if (hm) {
      const lvl = hm[1].length;
      out.push(`<h${lvl}>${inlineMd(hm[2])}</h${lvl}>`);
      i++;
      continue;
    }
    // HR
    if (/^---+\s*$/.test(line) || /^\*\*\*\s*$/.test(line)) {
      out.push('<hr>');
      i++;
      continue;
    }
    // Already-HTML (e.g. tables we replaced)
    if (/^\s*<(table|thead|tbody|tr|h\d|p|ul|ol|li|hr|blockquote|pre)/i.test(line)) {
      out.push(line);
      i++;
      continue;
    }
    // Blockquote
    if (/^>\s?/.test(line)) {
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        buf.push(lines[i].replace(/^>\s?/, ''));
        i++;
      }
      out.push(`<blockquote>${renderMarkdown(buf.join('\n'))}</blockquote>`);
      continue;
    }
    // Lists
    if (/^\s*[-*]\s+/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
        buf.push(lines[i].replace(/^\s*[-*]\s+/, ''));
        i++;
        // continuation lines (indented)
        while (i < lines.length && /^\s{2,}\S/.test(lines[i])) {
          buf[buf.length - 1] += ' ' + lines[i].trim();
          i++;
        }
      }
      out.push('<ul>' + buf.map(li => `<li>${inlineMd(li)}</li>`).join('') + '</ul>');
      continue;
    }
    if (/^\s*\d+\.\s+/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        buf.push(lines[i].replace(/^\s*\d+\.\s+/, ''));
        i++;
        while (i < lines.length && /^\s{2,}\S/.test(lines[i])) {
          buf[buf.length - 1] += ' ' + lines[i].trim();
          i++;
        }
      }
      out.push('<ol>' + buf.map(li => `<li>${inlineMd(li)}</li>`).join('') + '</ol>');
      continue;
    }
    // Frontmatter delimiter (---) is HR above; YAML lines as paragraphs
    // Blank
    if (/^\s*$/.test(line)) { i++; continue; }
    // Paragraph
    const buf = [line];
    i++;
    while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6})\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !/^\s*[-*]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i]) && !/^\s*<(table|thead|tbody|tr|h\d|p|ul|ol|li|hr|blockquote|pre)/i.test(lines[i])) {
      buf.push(lines[i]);
      i++;
    }
    out.push(`<p>${inlineMd(buf.join(' '))}</p>`);
  }

  let html = out.join('\n');
  // Restore code blocks with syntax highlighting if lang known
  html = html.replace(/\x00CODE(\d+)\x00/g, (m, idx) => {
    const blk = blocks[parseInt(idx, 10)];
    const code = highlightCode(blk.code, blk.lang ? '.' + blk.lang : '');
    return `<pre><code>${code}</code></pre>`;
  });
  return html;
}

function inlineMd(s) {
  // Escape first, then re-introduce known tokens.
  s = escapeHtml(s);
  // Inline code `x`
  s = s.replace(/`([^`]+)`/g, (m, c) => `<code>${c}</code>`);
  // Wiki-links [[X]] (may include dashes, slashes, digits)
  s = s.replace(/\[\[([^\]]+)\]\]/g, (m, target) => {
    return resolveXref(target, target);
  });
  // Links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, text, url) => {
    if (/^https?:/.test(url)) {
      return `<a href="${url}" target="_blank" rel="noopener">${text}</a>`;
    }
    return resolveXref(url, text);
  });
  // Bold **x**
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italics *x* (but not **)
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  // Path references like `gielinor/...` or `meta/...` — best-effort linkify when not already in code/anchor
  return s;
}

function resolveXref(target, text) {
  // Target can be: D-NNN, S-NNN, plan, path like meta/foo.md, .claude/hooks/xxx.py
  // Try to resolve to a file in DATA.files.
  let resolved = null;

  // Strip @ prefix used by Claude Code imports.
  let t = target.replace(/^@/, '');

  // Direct file match
  if (DATA.files[t]) {
    resolved = t;
  } else if (DATA.files[t + '.md']) {
    resolved = t + '.md';
  } else {
    // D-NNN slug match against lorebook/decisions/
    const dMatch = /^D-(\d+)/.exec(t);
    if (dMatch) {
      const key = Object.keys(DATA.files).find(k => k.startsWith(`lorebook/decisions/D-${dMatch[1]}_`));
      if (key) resolved = key;
    }
  }

  if (resolved) {
    return `<a class="xref" data-target="${escapeHtml(resolved)}" href="#${escapeHtml(resolved)}">${escapeHtml(text)}</a>`;
  }
  return `<a class="xref unresolved" title="not in gielinor/ (likely a dev-brain reference)">${escapeHtml(text)}</a>`;
}

function highlightCode(code, ext) {
  if (ext === '.py') return highlightPython(code);
  if (ext === '.json') return highlightJson(code);
  return escapeHtml(code);
}

function highlightPython(code) {
  // tokenize: comments, strings, keywords, numbers, rest
  const KW = new Set(['False','None','True','and','as','assert','async','await','break','class','continue','def','del','elif','else','except','finally','for','from','global','if','import','in','is','lambda','nonlocal','not','or','pass','raise','return','try','while','with','yield','self']);
  let out = '';
  let i = 0;
  while (i < code.length) {
    const c = code[i];
    // comment
    if (c === '#') {
      let j = code.indexOf('\n', i);
      if (j === -1) j = code.length;
      out += `<span style="color:var(--com)">${escapeHtml(code.slice(i, j))}</span>`;
      i = j;
      continue;
    }
    // triple string
    const TDQ = '"' + '""';
    const TSQ = "'" + "''";
    if (code.startsWith(TDQ, i) || code.startsWith(TSQ, i)) {
      const q = code.substr(i, 3);
      const j = code.indexOf(q, i + 3);
      const end = j === -1 ? code.length : j + 3;
      out += `<span style="color:var(--str)">${escapeHtml(code.slice(i, end))}</span>`;
      i = end;
      continue;
    }
    // string
    if (c === '"' || c === "'") {
      const q = c;
      let j = i + 1;
      while (j < code.length && code[j] !== q) {
        if (code[j] === '\\') j++;
        j++;
      }
      j = Math.min(j + 1, code.length);
      out += `<span style="color:var(--str)">${escapeHtml(code.slice(i, j))}</span>`;
      i = j;
      continue;
    }
    // identifier / keyword
    if (/[A-Za-z_]/.test(c)) {
      let j = i;
      while (j < code.length && /[A-Za-z0-9_]/.test(code[j])) j++;
      const word = code.slice(i, j);
      if (KW.has(word)) out += `<span style="color:var(--kw)">${escapeHtml(word)}</span>`;
      else out += escapeHtml(word);
      i = j;
      continue;
    }
    // number
    if (/[0-9]/.test(c)) {
      let j = i;
      while (j < code.length && /[0-9.]/.test(code[j])) j++;
      out += `<span style="color:var(--num)">${escapeHtml(code.slice(i, j))}</span>`;
      i = j;
      continue;
    }
    out += escapeHtml(c);
    i++;
  }
  return out;
}

function highlightJson(code) {
  // Quick pass.
  let out = escapeHtml(code);
  out = out.replace(/(&quot;[^&]*?&quot;)(\s*:)?/g, (m, str, colon) => {
    const color = colon ? 'var(--accent)' : 'var(--str)';
    return `<span style="color:${color}">${str}</span>${colon || ''}`;
  });
  out = out.replace(/\b(true|false|null)\b/g, '<span style="color:var(--kw)">$1</span>');
  out = out.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span style="color:var(--num)">$1</span>');
  return out;
}

function renderCode(code, ext) {
  return `<pre class="raw">${highlightCode(code, ext)}</pre>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---- Landing ----
function renderLanding() {
  currentPath = null;
  $$('.tree .row.active').forEach(r => r.classList.remove('active'));
  const fileCount = Object.keys(DATA.files).length;
  const dirCount = Object.keys(DATA.dirs).length;
  const driftCount = Object.values(DATA.files).filter(f => f.drift).length;

  const diagram = `\
gielinor/                                    ← the brain root
│
├─ CLAUDE.md, CLAUDE.local.md, .mcp.json, ticks.md  ← BODY (loads first)
├─ .claude/hooks/*.py + settings.json               ← HOOKS (four guarantees)
│
├─ meta/                  ← RULEBOOK (imported into CLAUDE.md each session)
│   write-rules · modes · archive-discipline · drafts-mechanics · death-and-spawn
│
├─ examine/   ← agent's self-model (global)
├─ niksis8/   ← model of Niklavs (global)
├─ keepsake/  ← always-surface pins (global)
├─ lorebook/  ← decisions + assumptions + patch-notes (the build log)
│
├─ spellbook/rituals/     ← respawn · bankstanding (canonical procedures)
│
└─ players/               ← CHARACTERS (Zezima, Jebrim) — each with the full template:
       bank · quest-log · spellbook · inventory  (per-player only)
       examine · niksis8_character · keepsake    (also per-player)
       _about · persona · CLAUDE.md
`;

  const startHere = [
    { path: '.claude/hooks/block-confirmed-writes.py', why: 'Hook #1 — security boundary; verify the path-match scope.' },
    { path: '.claude/hooks/block-deletes.py', why: 'Hook #2 — broad delete pattern matching; verify the trade-off.' },
    { path: '.claude/hooks/dwarf-write-boundary.py', why: 'Hook #3 — depends on env-var propagation; verify it actually fires.' },
    { path: '.claude/hooks/block-sub-dwarf-spawn.py', why: 'Hook #4 — same env-var concern; matcher patterns.' },
    { path: '.claude/settings.json', why: 'Wires the hooks. Matcher patterns are load-bearing.' },
    { path: 'meta/write-rules.md', why: 'Per-layer write discipline table — every row is a judgment call.' },
    { path: 'meta/modes.md', why: 'Principal vs dwarf split + cross-player invocation.' },
    { path: 'meta/archive-discipline.md', why: 'Never-delete rule + archive/rejected distinction.' },
    { path: 'meta/drafts-mechanics.md', why: 'Drafts → confirmed flow + observation rule.' },
    { path: 'meta/death-and-spawn.md', why: 'Crash recovery + reset table.' },
    { path: 'spellbook/rituals/respawn.md', why: 'Canonical load order — must be exactly right (S004 removed old step 6 + refined reconciliation).' },
    { path: 'spellbook/rituals/bankstanding.md', why: 'Cross-cutting reorganization — its own session mode (S004 rewrite).' },
    { path: 'lorebook/_about.md', why: 'Self-improvement log — redefined in S004; verify the new framing.' },
    { path: 'CLAUDE.md', why: 'Master body — voice, four-guarantees, address-based player invocation.' },
    { path: 'players/_about.md', why: 'Roster + invocation; rewritten in S004 to match address-based rule.' },
    { path: 'players/jebrim/persona.md', why: 'Jebrim voice spec.' },
    { path: 'players/jebrim/_about.md', why: 'Jebrim character framing + source repos.' },
    { path: 'players/zezima/persona.md', why: 'Zezima voice spec.' },
    { path: 'players/zezima/_about.md', why: 'Zezima character framing.' },
  ];

  $('#main').innerHTML = `
    <div class="landing">
      <h1>gielinor/ audit</h1>
      <div class="lede">
        Single-file audit of the gielinor/ scaffold landed in [[S003]] on 2026-05-20.
        Walk the tree on the left. Files flagged <span class="kbd" style="color:var(--drift)">DRIFT</span> are where the builder made a non-obvious judgment call worth verifying. Everything else is structurally inert (empty placeholders, .gitkeep markers).
      </div>

      <div class="cards">
        <div class="card"><div class="num">${fileCount}</div><div class="label">files</div></div>
        <div class="card"><div class="num">${dirCount}</div><div class="label">directories</div></div>
        <div class="card"><div class="num" style="color:var(--drift)">${driftCount}</div><div class="label">drift flags</div></div>
      </div>

      <div class="section-head">Architecture</div>
      <div class="diagram"><pre>${escapeHtml(diagram)}</pre></div>

      <div class="section-head">Start auditing here</div>
      <ol class="start-list">
        ${startHere.map((s, idx) => {
          const meta = DATA.files[s.path];
          if (!meta) return '';
          return `<li><span class="ord">${idx+1}</span><a class="xref" data-target="${s.path}" href="#${s.path}">${escapeHtml(s.path)}</a>${meta.drift ? ' <span class="badge" style="background:var(--drift);color:var(--bg);padding:0 4px;border-radius:3px;font-size:10px;font-weight:700">DRIFT</span>' : ''}<div class="why">${escapeHtml(s.why)}</div></li>`;
        }).join('')}
      </ol>

      <div class="section-head">Audit discipline</div>
      <div class="md">
        <ul>
          <li>The <strong>Purpose</strong> line on every file describes its <em>role in the architecture</em> — not a summary of contents. If the purpose doesn't match what you see in the inlined contents, that's a structural drift worth flagging.</li>
          <li>The <strong>Drift flag</strong> is honest about where the builder extended your sketches or authored content from scratch. Where you see one, check whether the call was made the way you'd have made it.</li>
          <li>Wiki-links (<code>[[D-001]]</code>) and path references resolve in-page; unresolved links are likely dev-brain references (out of this audit's scope).</li>
        </ul>
      </div>

      ${renderContentsSection()}
    </div>
  `;
  $$('.xref').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const target = a.dataset.target;
      if (target && DATA.files[target]) openFile(target);
    });
  });
}

// ---- Linear "File Contents" section (verbatim contents, in spec order) ----
function renderContentsSection() {
  const groups = DATA.groups || [];
  // Build TOC
  let toc = '<div class="contents-toc"><div class="contents-toc-head">Jump to</div><ul>';
  for (const [label, paths] of groups) {
    const slug = slugify(label);
    toc += `<li><a href="#group-${slug}">${escapeHtml(label)}</a> <span class="contents-toc-count">${paths.length}</span></li>`;
  }
  toc += '</ul></div>';

  // Build sections
  let body = '';
  for (const [label, paths] of groups) {
    const slug = slugify(label);
    body += `<h2 class="contents-group-head" id="group-${slug}">${escapeHtml(label)}</h2>`;
    for (const path of paths) {
      const meta = DATA.files[path];
      if (!meta) {
        body += `<div class="contents-file missing"><h3>gielinor/${escapeHtml(path)}</h3><div class="contents-missing">⚠ file not present in scaffold</div></div>`;
        continue;
      }
      const badge = meta.drift ? '<span class="badge contents-badge">DRIFT</span>' : '';
      const driftBlock = meta.drift ? `<div class="drift contents-drift"><span class="label">⚑ Drift flag</span><div>${escapeHtml(meta.reason)}</div></div>` : '';
      const anchorId = 'content-' + slugify(path);
      body += `
        <div class="contents-file" id="${anchorId}">
          <h3>gielinor/${escapeHtml(path)}${badge}</h3>
          <div class="contents-purpose"><span class="label">Purpose</span> ${escapeHtml(meta.purpose)}</div>
          ${driftBlock}
          <pre class="raw contents-raw"><code>${highlightCode(meta.content, meta.ext)}</code></pre>
        </div>
      `;
    }
  }

  return `
    <hr style="border:0;border-top:1px solid var(--border);margin:32px 0 16px;">
    <h1 class="contents-section-head">File Contents — verbatim</h1>
    <div class="lede">Literal contents of every load-bearing file, in review order. Markdown is shown raw (not rendered) so what you see is exactly what the agent reads. Empty scaffolding folders are omitted.</div>
    ${toc}
    ${body}
  `;
}

function slugify(s) {
  return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

// ---- Sidebar resize ----
function wireResize() {
  const sidebar = $('.sidebar');
  const handle = $('.sidebar-resize');
  let dragging = false;
  handle.addEventListener('mousedown', (e) => { dragging = true; e.preventDefault(); });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const w = Math.max(240, Math.min(600, e.clientX));
    sidebar.style.width = w + 'px';
  });
  window.addEventListener('mouseup', () => { dragging = false; });
}

// ---- Boot ----
function boot() {
  buildTree('', $('.tree'), 0);
  wireResize();
  $('#home-btn').addEventListener('click', () => renderLanding());
  renderLanding();
  // Hash deep-link
  if (location.hash) {
    const path = decodeURIComponent(location.hash.slice(1));
    if (DATA.files[path]) openFile(path);
  }
}

document.addEventListener('DOMContentLoaded', boot);

</script>
</body>
</html>
